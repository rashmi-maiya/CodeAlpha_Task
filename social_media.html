
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-tertiary);font-size:14px}
button,input,textarea,select{font-family:var(--font-sans)}

.app{display:grid;grid-template-columns:220px 1fr 220px;gap:0;min-height:600px;max-width:900px;margin:0 auto}
.sidebar{padding:16px 12px;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;flex-direction:column;gap:2px}
.right-sidebar{padding:16px 12px;border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.main{background:var(--color-background-tertiary)}

.logo{font-size:18px;font-weight:500;padding:6px 8px 14px;color:var(--color-text-primary);letter-spacing:-.01em}
.logo span{color:#6366f1}

.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--border-radius-md);font-size:14px;color:var(--color-text-secondary);cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.nav-item i{font-size:18px}
.nav-sep{height:0.5px;background:var(--color-border-tertiary);margin:8px 0}

.me-strip{margin-top:auto;padding:10px 8px;border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:var(--border-radius-md)}
.me-strip:hover{background:var(--color-background-secondary)}
.me-name{font-size:13px;font-weight:500}
.me-handle{font-size:11px;color:var(--color-text-secondary)}

.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;font-size:13px;color:#fff}
.av-sm{width:30px;height:30px;font-size:12px}
.av-md{width:38px;height:38px;font-size:14px}
.av-lg{width:52px;height:52px;font-size:18px}
.av-xl{width:72px;height:72px;font-size:24px}

.page{display:none}
.page.on{display:block}

.feed{padding:0}
.composer{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px;display:flex;gap:10px}
.composer-body{flex:1}
.composer textarea{width:100%;border:none;background:transparent;resize:none;font-size:14px;color:var(--color-text-primary);padding:4px 0;outline:none;line-height:1.55;min-height:52px}
.composer textarea::placeholder{color:var(--color-text-secondary)}
.composer-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.char-count{font-size:11px;color:var(--color-text-secondary)}
.char-count.warn{color:var(--color-text-warning)}
.post-btn{padding:7px 18px;background:#6366f1;border:none;border-radius:20px;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.post-btn:hover{background:#4f51d8}
.post-btn:disabled{opacity:.45;cursor:not-allowed}

.post-card{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px;cursor:pointer}
.post-card:hover{background:var(--color-background-secondary)}
.post-header{display:flex;gap:10px;margin-bottom:8px}
.post-meta{flex:1;min-width:0}
.post-author{font-size:13px;font-weight:500;cursor:pointer}
.post-author:hover{text-decoration:underline;color:#6366f1}
.post-time{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.post-text{font-size:14px;line-height:1.6;color:var(--color-text-primary);margin-bottom:10px;word-break:break-word}
.post-actions{display:flex;gap:0;margin:-4px}
.act-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--color-text-secondary);border-radius:var(--border-radius-md)}
.act-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.act-btn.liked{color:#e2394a}
.act-btn i{font-size:16px}

.post-detail{background:var(--color-background-primary)}
.post-detail-header{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
.back-btn{padding:6px 8px;border:none;background:transparent;cursor:pointer;border-radius:var(--border-radius-md);color:var(--color-text-secondary)}
.back-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.back-btn i{font-size:18px}
.post-detail-body{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.post-detail-text{font-size:16px;line-height:1.65;margin:10px 0 12px}
.post-detail-time{font-size:12px;color:var(--color-text-secondary);margin-bottom:10px}
.post-detail-stats{display:flex;gap:16px;padding:10px 0;border-top:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary)}
.stat-num{font-weight:500}
.stat-lbl{color:var(--color-text-secondary);margin-left:3px}

.comments{background:var(--color-background-primary)}
.comment{display:flex;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.comment-body{flex:1;min-width:0}
.comment-author{font-size:13px;font-weight:500}
.comment-time{font-size:11px;color:var(--color-text-secondary);margin-left:6px}
.comment-text{font-size:13px;line-height:1.55;margin-top:3px;color:var(--color-text-primary)}
.comment-like{display:flex;align-items:center;gap:4px;padding:3px 6px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--color-text-secondary);border-radius:var(--border-radius-md);margin-top:4px}
.comment-like:hover{background:var(--color-background-secondary)}
.comment-like.liked{color:#e2394a}

.reply-box{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:10px;background:var(--color-background-primary)}
.reply-box textarea{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:13px;resize:none;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;min-height:38px}
.reply-box textarea:focus{border-color:#6366f1}
.reply-btn{padding:7px 14px;background:#6366f1;border:none;border-radius:var(--border-radius-md);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap;align-self:flex-end}
.reply-btn:hover{background:#4f51d8}
.reply-btn:disabled{opacity:.45;cursor:not-allowed}

.profile-header{background:var(--color-background-primary);padding:20px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.profile-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.profile-name{font-size:18px;font-weight:500;margin-bottom:2px}
.profile-handle{font-size:13px;color:var(--color-text-secondary)}
.profile-bio{font-size:13px;color:var(--color-text-secondary);line-height:1.55;margin:10px 0}
.profile-stats{display:flex;gap:20px;font-size:13px}
.follow-btn{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #6366f1;background:transparent;color:#6366f1}
.follow-btn:hover{background:#6366f1;color:#fff}
.follow-btn.following{background:#6366f1;color:#fff;border-color:#6366f1}
.follow-btn.following:hover{background:#4f51d8;border-color:#4f51d8}
.follow-btn.own{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.follow-btn.own:hover{background:var(--color-background-secondary)}
.profile-tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.ptab{flex:1;padding:12px;text-align:center;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.ptab:hover{color:var(--color-text-primary)}
.ptab.on{color:#6366f1;border-bottom-color:#6366f1;font-weight:500}

.who-to-follow .wf-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.wf-item:last-child{border-bottom:none}
.wf-name{font-size:13px;font-weight:500;cursor:pointer}
.wf-name:hover{color:#6366f1}
.wf-handle{font-size:11px;color:var(--color-text-secondary)}
.wf-follow{padding:4px 12px;border-radius:20px;border:1px solid #6366f1;background:transparent;color:#6366f1;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;margin-left:auto}
.wf-follow:hover{background:#6366f1;color:#fff}
.wf-follow.on{background:#6366f1;color:#fff}

.auth-wrap{min-height:400px;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:28px;width:100%;max-width:360px}
.auth-logo{font-size:22px;font-weight:500;text-align:center;margin-bottom:6px;letter-spacing:-.01em}
.auth-logo span{color:#6366f1}
.auth-sub{text-align:center;font-size:13px;color:var(--color-text-secondary);margin-bottom:22px;line-height:1.5}
.flbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin-bottom:5px}
.finput{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;margin-bottom:12px}
.finput:focus{border-color:#6366f1}
.finput.bad{border-color:#e2394a}
.ferr{font-size:12px;color:#e2394a;margin-bottom:10px;padding:8px 10px;background:rgba(226,57,74,.06);border-radius:var(--border-radius-md);border:0.5px solid rgba(226,57,74,.2);display:none}
.abtn{width:100%;padding:10px;background:#6366f1;border:none;border-radius:var(--border-radius-md);color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.abtn:hover{background:#4f51d8}
.aswitch{text-align:center;font-size:12px;color:var(--color-text-secondary);margin-top:14px}
.aswitch a{color:#6366f1;cursor:pointer;text-decoration:underline}

.trending-item{padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.trending-item:last-child{border-bottom:none}
.trending-item:hover .t-tag{color:#6366f1}
.t-tag{font-size:13px;font-weight:500}
.t-count{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.rside-title{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--color-text-primary)}
.rside-sec{margin-bottom:20px}

.notif{display:flex;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.notif:hover{background:var(--color-background-secondary)}
.notif.unread{background:rgba(99,102,241,.04)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-text{font-size:13px;line-height:1.5;flex:1}
.notif-time{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#6366f1;flex-shrink:0;margin-top:5px}

.explore-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.explore-tag{padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);cursor:pointer;background:var(--color-background-primary)}
.explore-tag:hover{background:var(--color-background-secondary)}
.explore-tag:nth-child(even){border-right:none}
.et-name{font-size:14px;font-weight:500;color:#6366f1}
.et-count{font-size:12px;color:var(--color-text-secondary);margin-top:3px}

.empty-state{padding:48px 24px;text-align:center;color:var(--color-text-secondary)}
.empty-state i{font-size:36px;display:block;margin-bottom:10px;color:var(--color-text-secondary)}
.empty-state p{font-size:13px;line-height:1.6}

.toast-zone{position:absolute;top:-9999px;left:-9999px}
.inline-toast{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:8px;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>

<h2 class="sr-only">Burrow — a mini social media app with posts, likes, comments, and user profiles</h2>

<div id="toastZone" style="position:sticky;top:0;z-index:100;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:none;padding:8px 16px">
  <div id="toastMsg" class="inline-toast"></div>
</div>

<div id="authWrap" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">burrow<span>.</span></div>
    <p class="auth-sub" id="authSub">Where small communities actually talk to each other.</p>
    <div id="authErr" class="ferr"></div>
    <div id="authFields"></div>
    <p class="aswitch" id="authSwitch"></p>
  </div>
</div>

<div id="mainApp" class="app" style="display:none">
  <aside class="sidebar">
    <div class="logo">burrow<span>.</span></div>
    <button class="nav-item active" id="nav-feed" onclick="showPage('feed')"><i class="ti ti-home" aria-hidden="true"></i> Home</button>
    <button class="nav-item" id="nav-explore" onclick="showPage('explore')"><i class="ti ti-compass" aria-hidden="true"></i> Explore</button>
    <button class="nav-item" id="nav-notifs" onclick="showPage('notifs')"><i class="ti ti-bell" aria-hidden="true"></i> Alerts <span id="notifDot" style="width:7px;height:7px;border-radius:50%;background:#6366f1;display:none;margin-left:auto"></span></button>
    <button class="nav-item" id="nav-profile" onclick="showPage('myprofile')"><i class="ti ti-user" aria-hidden="true"></i> Profile</button>
    <div class="nav-sep"></div>
    <button class="nav-item" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i> Sign out</button>
    <div class="me-strip" onclick="showPage('myprofile')">
      <div class="av av-sm" id="sidebarAv"></div>
      <div style="min-width:0">
        <div class="me-name" id="sidebarName"></div>
        <div class="me-handle" id="sidebarHandle"></div>
      </div>
    </div>
  </aside>

  <main id="mainContent" style="border-right:0.5px solid var(--color-border-tertiary)"></main>

  <aside class="right-sidebar">
    <div class="rside-sec">
      <div class="rside-title">Trending topics</div>
      <div id="trendingList"></div>
    </div>
    <div class="rside-sec">
      <div class="rside-title">Who to follow</div>
      <div class="who-to-follow" id="whoToFollow"></div>
    </div>
  </aside>
</div>

<script>
const COLORS=['#6366f1','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#2563eb'];
function hue(str){let h=0;for(let c of str)h=(h*31+c.charCodeAt(0))&0xffffff;return COLORS[h%COLORS.length]}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function ago(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function uid(){return Math.random().toString(36).slice(2,9)}

let db={users:{},posts:{},comments:{},follows:{},likes:{},notifs:{}};
let me=null;

function save(){localStorage.setItem('burrow_db',JSON.stringify(db));localStorage.setItem('burrow_me',me||'')}
function load(){
  try{db=JSON.parse(localStorage.getItem('burrow_db')||'{}');
    db.users=db.users||{};db.posts=db.posts||{};db.comments=db.comments||{};
    db.follows=db.follows||{};db.likes=db.likes||{};db.notifs=db.notifs||{};
  }catch(e){db={users:{},posts:{},comments:{},follows:{},likes:{},notifs:{}}}
  me=localStorage.getItem('burrow_me')||null;
  if(me&&!db.users[me])me=null;
}

function seed(){
  if(Object.keys(db.users).length>0)return;
  const people=[
    {id:'u1',name:'Maya Reyes',handle:'mayar',bio:'Photographer based in Lisbon. I shoot film, drink too much coffee, and occasionally write things down.',joined:Date.now()-864000000*10},
    {id:'u2',name:'Tariq Osei',handle:'tariqs',bio:'Frontend dev who thinks CSS is an art form. Building small tools nobody asked for.',joined:Date.now()-864000000*8},
    {id:'u3',name:'Nadia Kovač',handle:'nadiak',bio:'Just here to complain about the weather and share pictures of my cat Biscuit.',joined:Date.now()-864000000*6},
    {id:'u4',name:'James Liu',handle:'jamesl',bio:'Writer. Working on a novel that\'s been "almost done" for three years.',joined:Date.now()-864000000*4},
    {id:'u5',name:'Priya Nair',handle:'priyan',bio:'UX designer. I believe in boring interfaces that actually work.',joined:Date.now()-864000000*2},
  ];
  people.forEach(u=>{db.users[u.id]={...u,pwd:'demo123',followers:[],following:[]}});

  const seedPosts=[
    {uid:'u1',text:'Shot my first roll of film in two years yesterday. Something about slowing down and committing to each frame hits different when you only have 36 shots.',ts:Date.now()-3600000*18},
    {uid:'u2',text:'Hot take: the best CSS you can write is CSS you delete. Spent an hour this morning removing 200 lines and everything still works perfectly.',ts:Date.now()-3600000*14},
    {uid:'u3',text:'Biscuit knocked my coffee off the desk for the third time this week. He looked me dead in the eye while doing it. No regrets.',ts:Date.now()-3600000*10},
    {uid:'u4',text:'Chapter 12 is finally done. Only took a year and a half and four complete rewrites. Totally normal. Fine. This is fine.',ts:Date.now()-3600000*7},
    {uid:'u5',text:'Reminder that "users will figure it out" is never a good UX strategy. If you have to explain it, redesign it.',ts:Date.now()-3600000*4},
    {uid:'u1',text:'Rain in Lisbon today. The cobblestones look incredible when wet. Might be the most beautiful city for bad weather.',ts:Date.now()-3600000*2},
    {uid:'u2',text:'Finally got dark mode working without a single JS class toggle. Pure CSS custom properties all the way down. Worth every minute of the suffering.',ts:Date.now()-3600000*1},
  ];
  seedPosts.forEach(p=>{
    const id='p'+uid();
    db.posts[id]={id,uid:p.uid,text:p.text,ts:p.ts,likes:[],comments:[]};
  });

  const postIds=Object.keys(db.posts);
  const commentData=[
    {pid:postIds[0],uid:'u2',text:'This actually made me want to try film again. Been meaning to for years.',ts:Date.now()-3600000*16},
    {pid:postIds[0],uid:'u3',text:'Which camera? My dad has an old Pentax sitting in a drawer.',ts:Date.now()-3600000*15},
    {pid:postIds[1],uid:'u5',text:'100% agree. The best component is one that doesn\'t exist yet.',ts:Date.now()-3600000*12},
    {pid:postIds[2],uid:'u1',text:'Biscuit has chosen violence and I respect that for him.',ts:Date.now()-3600000*9},
    {pid:postIds[2],uid:'u4',text:'My dog does the same thing. Cats and dogs have clearly formed an alliance against us.',ts:Date.now()-3600000*8},
    {pid:postIds[4],uid:'u2',text:'Saved. Sending this to every stakeholder I\'ve ever met.',ts:Date.now()-3600000*3},
  ];
  commentData.forEach(c=>{
    const id='c'+uid();
    db.comments[id]={id,pid:c.pid,uid:c.uid,text:c.text,ts:c.ts,likes:[]};
    if(!db.posts[c.pid].comments)db.posts[c.pid].comments=[];
    db.posts[c.pid].comments.push(id);
  });

  db.likes['u2_'+postIds[0]]=true;db.posts[postIds[0]].likes=['u2'];
  db.likes['u3_'+postIds[0]]=true;db.posts[postIds[0]].likes.push('u3');
  db.likes['u5_'+postIds[1]]=true;db.posts[postIds[1]].likes=['u5'];
  db.likes['u1_'+postIds[2]]=true;db.posts[postIds[2]].likes=['u1'];
  db.likes['u4_'+postIds[2]]=true;db.posts[postIds[2]].likes.push('u4');
  db.likes['u2_'+postIds[4]]=true;db.posts[postIds[4]].likes=['u2','u3','u4'];

  db.follows['u1_u2']=true;db.users.u1.following.push('u2');db.users.u2.followers.push('u1');
  db.follows['u2_u1']=true;db.users.u2.following.push('u1');db.users.u1.followers.push('u2');
  db.follows['u3_u1']=true;db.users.u3.following.push('u1');db.users.u1.followers.push('u3');
  db.follows['u4_u5']=true;db.users.u4.following.push('u5');db.users.u5.followers.push('u4');
  db.follows['u5_u2']=true;db.users.u5.following.push('u2');db.users.u2.followers.push('u5');
  save();
}

load();seed();

function boot(){
  if(!me){showAuth('login');return}
  document.getElementById('authWrap').style.display='none';
  document.getElementById('mainApp').style.display='grid';
  const u=db.users[me];
  const av=document.getElementById('sidebarAv');
  av.style.background=hue(u.name);av.textContent=initials(u.name);
  document.getElementById('sidebarName').textContent=u.name;
  document.getElementById('sidebarHandle').textContent='@'+u.handle;
  updateNotifDot();
  showPage('feed');
  renderRightSide();
}

function showAuth(mode){
  document.getElementById('mainApp').style.display='none';
  document.getElementById('authWrap').style.display='flex';
  const f=document.getElementById('authFields');
  const sw=document.getElementById('authSwitch');
  const sub=document.getElementById('authSub');
  document.getElementById('authErr').style.display='none';
  if(mode==='login'){
    sub.textContent='Sign in to pick up where you left off.';
    f.innerHTML=`<label class="flbl">Email or handle</label><input class="finput" id="liId" placeholder="e.g. mayar or maya@example.com" autocomplete="username"><label class="flbl">Password</label><input class="finput" id="liPwd" type="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"><button class="abtn" onclick="doLogin()">Sign in</button>`;
    sw.innerHTML='New here? <a onclick="showAuth(\'register\')">Create an account</a> · or try <a onclick="demoLogin()">demo login</a>';
  } else {
    sub.textContent='Takes about a minute. No email verification, no fuss.';
    f.innerHTML=`<label class="flbl">Your name</label><input class="finput" id="rgName" placeholder="e.g. Sam Rivera" autocomplete="name"><label class="flbl">Handle</label><input class="finput" id="rgHandle" placeholder="e.g. samr (no spaces)" autocomplete="username"><label class="flbl">Password</label><input class="finput" id="rgPwd" type="password" placeholder="At least 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()"><button class="abtn" onclick="doRegister()">Create account</button>`;
    sw.innerHTML='Already have one? <a onclick="showAuth(\'login\')">Sign in</a>';
  }
}

function demoLogin(){
  const people=Object.values(db.users);
  const u=people[Math.floor(Math.random()*people.length)];
  me=u.id;save();boot();toast('Signed in as '+u.name,'ok');
}

function doLogin(){
  const raw=(document.getElementById('liId').value||'').trim().toLowerCase();
  const pwd=document.getElementById('liPwd').value||'';
  const err=document.getElementById('authErr');
  err.style.display='none';
  if(!raw||!pwd){showAuthErr('Fill in both fields to continue.');return}
  const u=Object.values(db.users).find(x=>x.handle.toLowerCase()===raw||x.handle.toLowerCase()+'@burrow.app'===raw);
  if(!u||u.pwd!==pwd){showAuthErr('Those details don\'t match. Double-check your handle and password, or use the demo login link below.');return}
  me=u.id;save();boot();
}

function doRegister(){
  const name=(document.getElementById('rgName').value||'').trim();
  const handle=(document.getElementById('rgHandle').value||'').trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const pwd=document.getElementById('rgPwd').value||'';
  const err=document.getElementById('authErr');err.style.display='none';
  if(!name||!handle||!pwd){showAuthErr('All fields are required.');return}
  if(handle.length<2){showAuthErr('Handle needs to be at least 2 characters.');return}
  if(pwd.length<6){showAuthErr('Password needs at least 6 characters.');return}
  if(Object.values(db.users).find(u=>u.handle===handle)){showAuthErr('That handle is already taken — try a variation.');return}
  const id='u'+uid();
  db.users[id]={id,name,handle,bio:'',pwd,joined:Date.now(),followers:[],following:[]};
  me=id;save();boot();toast('Welcome to burrow, '+name.split(' ')[0]+'!','ok');
}

function showAuthErr(msg){const e=document.getElementById('authErr');e.textContent=msg;e.style.display='block'}
function doLogout(){me=null;save();document.getElementById('mainApp').style.display='none';showAuth('login')}

function showPage(name,param){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const nm=name==='myprofile'?'profile':name;
  const nb=document.getElementById('nav-'+nm);
  if(nb)nb.classList.add('active');
  const mc=document.getElementById('mainContent');
  if(name==='feed')renderFeed(mc);
  else if(name==='explore')renderExplore(mc);
  else if(name==='notifs')renderNotifs(mc);
  else if(name==='myprofile')renderProfile(mc,me);
  else if(name==='profile')renderProfile(mc,param);
  else if(name==='post')renderPostDetail(mc,param);
}

function renderFeed(el){
  const posts=Object.values(db.posts)
    .filter(p=>{
      if(p.uid===me)return true;
      return db.users[me]&&db.users[me].following&&db.users[me].following.includes(p.uid);
    })
    .sort((a,b)=>b.ts-a.ts);
  el.innerHTML='<div class="feed">'+composerHTML()+
    (posts.length?posts.map(p=>postCardHTML(p)).join(''):`<div class="empty-state"><i class="ti ti-friends" aria-hidden="true"></i><p>Your feed is quiet right now.<br>Follow some people to see what they\'re up to.</p></div>`)+
    '</div>';
}

function composerHTML(){
  const u=db.users[me];
  return `<div class="composer">
    <div class="av av-md" style="background:${hue(u.name)}">${initials(u.name)}</div>
    <div class="composer-body">
      <textarea id="composerText" placeholder="What's going on?" maxlength="280" oninput="updateComposer(this)"></textarea>
      <div class="composer-foot">
        <span class="char-count" id="charCount">280</span>
        <button class="post-btn" id="postBtn" disabled onclick="submitPost()">Post it</button>
      </div>
    </div>
  </div>`;
}

function updateComposer(ta){
  const left=280-ta.value.length;
  const cc=document.getElementById('charCount');
  if(cc){cc.textContent=left;cc.className='char-count'+(left<30?' warn':'')}
  const pb=document.getElementById('postBtn');
  if(pb)pb.disabled=ta.value.trim().length===0;
}

function submitPost(){
  const ta=document.getElementById('composerText');
  const text=ta.value.trim();
  if(!text)return;
  const id='p'+uid();
  db.posts[id]={id,uid:me,text,ts:Date.now(),likes:[],comments:[]};
  save();ta.value='';
  updateComposer(ta);
  showPage('feed');
  toast('Posted!','ok');
}

function postCardHTML(p,full=false){
  const u=db.users[p.uid];if(!u)return'';
  const liked=p.likes&&p.likes.includes(me);
  const lc=p.likes?p.likes.length:0;
  const cc=p.comments?p.comments.length:0;
  return `<div class="post-card" onclick="showPage('post','${p.id}')">
    <div class="post-header">
      <div class="av av-md" style="background:${hue(u.name)}">${initials(u.name)}</div>
      <div class="post-meta">
        <div class="post-author" onclick="event.stopPropagation();showPage('profile','${u.id}')">${esc(u.name)}</div>
        <div class="post-time">@${u.handle} · ${ago(p.ts)}</div>
      </div>
    </div>
    <div class="post-text">${esc(p.text)}</div>
    <div class="post-actions" onclick="event.stopPropagation()">
      <button class="act-btn${liked?' liked':''}" onclick="toggleLike('${p.id}')">
        <i class="ti ti-heart" aria-hidden="true"></i> ${lc||''}
      </button>
      <button class="act-btn" onclick="showPage('post','${p.id}')">
        <i class="ti ti-message-circle" aria-hidden="true"></i> ${cc||''}
      </button>
      <button class="act-btn" onclick="sharePost('${p.id}')">
        <i class="ti ti-share" aria-hidden="true"></i>
      </button>
    </div>
  </div>`;
}

function toggleLike(pid){
  const p=db.posts[pid];if(!p)return;
  const key=me+'_'+pid;
  if(db.likes[key]){
    db.likes[key]=false;
    p.likes=p.likes.filter(x=>x!==me);
  } else {
    db.likes[key]=true;
    if(!p.likes.includes(me))p.likes.push(me);
    if(p.uid!==me){
      const nid='n'+uid();
      db.notifs[nid]={id:nid,to:p.uid,from:me,type:'like',pid,ts:Date.now(),read:false};
    }
  }
  save();
  if(document.querySelector('.post-detail'))renderPostDetail(document.getElementById('mainContent'),pid);
  else showPage('feed');
  updateNotifDot();
}

function sharePost(pid){toast('Link copied to clipboard (in a real app)','ok')}

function renderPostDetail(el,pid){
  const p=db.posts[pid];if(!p){el.innerHTML='<div class="empty-state"><i class="ti ti-ghost" aria-hidden="true"></i><p>Post not found.</p></div>';return}
  const u=db.users[p.uid];if(!u)return;
  const liked=p.likes&&p.likes.includes(me);
  const comments=(p.comments||[]).map(cid=>db.comments[cid]).filter(Boolean).sort((a,b)=>a.ts-b.ts);
  el.innerHTML=`<div class="post-detail">
    <div class="post-detail-header">
      <button class="back-btn" onclick="showPage('feed')" aria-label="Back"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <span style="font-size:15px;font-weight:500">Post</span>
    </div>
    <div class="post-detail-body">
      <div style="display:flex;gap:10px;margin-bottom:8px">
        <div class="av av-md" style="background:${hue(u.name)};cursor:pointer" onclick="showPage('profile','${u.id}')">${initials(u.name)}</div>
        <div>
          <div class="post-author" onclick="showPage('profile','${u.id}')">${esc(u.name)}</div>
          <div style="font-size:12px;color:var(--color-text-secondary)">@${u.handle}</div>
        </div>
      </div>
      <div class="post-detail-text">${esc(p.text)}</div>
      <div class="post-detail-time">${new Date(p.ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}</div>
      <div class="post-detail-stats">
        <span><span class="stat-num">${p.likes?p.likes.length:0}</span><span class="stat-lbl">likes</span></span>
        <span><span class="stat-num">${comments.length}</span><span class="stat-lbl">replies</span></span>
      </div>
      <div class="post-actions" style="margin-top:8px;margin:-4px">
        <button class="act-btn${liked?' liked':''}" onclick="toggleLike('${p.id}')">
          <i class="ti ti-heart" aria-hidden="true"></i> ${liked?'Liked':'Like'}
        </button>
        <button class="act-btn" onclick="sharePost('${p.id}')"><i class="ti ti-share" aria-hidden="true"></i> Share</button>
      </div>
    </div>
    <div class="comments">
      ${comments.length===0?`<div class="empty-state" style="padding:24px"><i class="ti ti-message-off" aria-hidden="true"></i><p>No replies yet. Be the first to say something.</p></div>`:''}
      ${comments.map(c=>commentHTML(c,pid)).join('')}
    </div>
    <div class="reply-box">
      <div class="av av-sm" style="background:${hue(db.users[me].name)}">${initials(db.users[me].name)}</div>
      <textarea id="replyText" placeholder="Write a reply…" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';document.getElementById('replyBtn').disabled=!this.value.trim()"></textarea>
      <button class="reply-btn" id="replyBtn" disabled onclick="submitReply('${pid}')">Reply</button>
    </div>
  </div>`;
}

function commentHTML(c,pid){
  const u=db.users[c.uid];if(!u)return'';
  const liked=c.likes&&c.likes.includes(me);
  return `<div class="comment">
    <div class="av av-sm" style="background:${hue(u.name)};cursor:pointer" onclick="showPage('profile','${u.id}')">${initials(u.name)}</div>
    <div class="comment-body">
      <span class="comment-author" onclick="showPage('profile','${u.id}')">${esc(u.name)}</span>
      <span class="comment-time">@${u.handle} · ${ago(c.ts)}</span>
      <div class="comment-text">${esc(c.text)}</div>
      <button class="comment-like${liked?' liked':''}" onclick="toggleCommentLike('${c.id}','${pid}')">
        <i class="ti ti-heart" aria-hidden="true"></i> ${c.likes&&c.likes.length?c.likes.length:''}
      </button>
    </div>
  </div>`;
}

function toggleCommentLike(cid,pid){
  const c=db.comments[cid];if(!c)return;
  const key=me+'_c_'+cid;
  if(db.likes[key]){db.likes[key]=false;c.likes=c.likes.filter(x=>x!==me)}
  else{db.likes[key]=true;if(!c.likes)c.likes=[];if(!c.likes.includes(me))c.likes.push(me)}
  save();renderPostDetail(document.getElementById('mainContent'),pid);
}

function submitReply(pid){
  const ta=document.getElementById('replyText');
  const text=ta.value.trim();if(!text)return;
  const id='c'+uid();
  db.comments[id]={id,pid,uid:me,text,ts:Date.now(),likes:[]};
  if(!db.posts[pid].comments)db.posts[pid].comments=[];
  db.posts[pid].comments.push(id);
  if(db.posts[pid].uid!==me){
    const nid='n'+uid();
    db.notifs[nid]={id:nid,to:db.posts[pid].uid,from:me,type:'reply',pid,ts:Date.now(),read:false};
  }
  save();updateNotifDot();
  renderPostDetail(document.getElementById('mainContent'),pid);
}

function renderProfile(el,uid){
  const u=db.users[uid];if(!u){el.innerHTML='<div class="empty-state"><i class="ti ti-ghost" aria-hidden="true"></i><p>User not found.</p></div>';return}
  const isMe=uid===me;
  const isFollowing=db.users[me]&&db.users[me].following&&db.users[me].following.includes(uid);
  const posts=Object.values(db.posts).filter(p=>p.uid===uid).sort((a,b)=>b.ts-a.ts);
  el.innerHTML=`<div>
    <div class="profile-header">
      <div class="profile-top">
        <div class="av av-xl" style="background:${hue(u.name)}">${initials(u.name)}</div>
        ${isMe
          ?`<button class="follow-btn own" onclick="editBio()">Edit bio</button>`
          :`<button class="follow-btn${isFollowing?' following':''}" onclick="toggleFollow('${uid}')">${isFollowing?'Following':'Follow'}</button>`}
      </div>
      <div class="profile-name">${esc(u.name)}</div>
      <div class="profile-handle">@${u.handle}</div>
      ${u.bio?`<div class="profile-bio">${esc(u.bio)}</div>`:''}
      <div class="profile-stats">
        <span><strong>${posts.length}</strong> <span style="color:var(--color-text-secondary)">posts</span></span>
        <span><strong>${u.followers?u.followers.length:0}</strong> <span style="color:var(--color-text-secondary)">followers</span></span>
        <span><strong>${u.following?u.following.length:0}</strong> <span style="color:var(--color-text-secondary)">following</span></span>
      </div>
    </div>
    <div class="profile-tabs">
      <div class="ptab on">Posts</div>
    </div>
    ${posts.length?posts.map(p=>postCardHTML(p)).join(''):`<div class="empty-state"><i class="ti ti-edit" aria-hidden="true"></i><p>${isMe?'You haven\'t posted anything yet.':'Nothing posted yet.'}</p></div>`}
  </div>`;
}

function editBio(){
  const u=db.users[me];
  const newBio=prompt('Update your bio (keep it real):',u.bio||'');
  if(newBio===null)return;
  u.bio=newBio.trim().slice(0,160);
  save();showPage('myprofile');
}

function toggleFollow(uid){
  const me_u=db.users[me];const them=db.users[uid];if(!me_u||!them)return;
  const key=me+'_'+uid;
  if(db.follows[key]){
    db.follows[key]=false;
    me_u.following=me_u.following.filter(x=>x!==uid);
    them.followers=them.followers.filter(x=>x!==me);
    toast('Unfollowed @'+them.handle,'ok');
  } else {
    db.follows[key]=true;
    if(!me_u.following.includes(uid))me_u.following.push(uid);
    if(!them.followers.includes(me))them.followers.push(me);
    const nid='n'+uid();
    db.notifs[nid]={id:nid,to:uid,from:me,type:'follow',ts:Date.now(),read:false};
    toast('Following @'+them.handle,'ok');
  }
  save();updateNotifDot();
  renderProfile(document.getElementById('mainContent'),uid);
  renderRightSide();
}

function renderExplore(el){
  const tags=['#photography','#webdev','#writing','#design','#travel','#film','#coding','#life'];
  const counts=[142,89,203,67,118,44,156,201];
  const allPosts=Object.values(db.posts).sort((a,b)=>b.likes.length-a.likes.length);
  el.innerHTML=`<div style="background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px">
    <input style="width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none" placeholder="Search posts and people…" oninput="handleExploreSearch(this.value)" id="exploreSearch">
  </div>
  <div style="background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 16px">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px">Topics</div>
    <div class="explore-grid">${tags.map((t,i)=>`<div class="explore-tag" onclick="filterExplore('${t}')"><div class="et-name">${t}</div><div class="et-count">${counts[i]} posts</div></div>`).join('')}</div>
  </div>
  <div id="exploreResults">
    <div style="padding:12px 16px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)">Popular right now</div>
    ${allPosts.map(p=>postCardHTML(p)).join('')}
  </div>`;
}

function handleExploreSearch(val){
  const res=document.getElementById('exploreResults');if(!res)return;
  if(!val.trim()){res.innerHTML='<div style="padding:12px 16px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)">Popular right now</div>'+Object.values(db.posts).sort((a,b)=>b.likes.length-a.likes.length).map(p=>postCardHTML(p)).join('');return}
  const q=val.toLowerCase();
  const matchPosts=Object.values(db.posts).filter(p=>p.text.toLowerCase().includes(q)).sort((a,b)=>b.ts-a.ts);
  const matchUsers=Object.values(db.users).filter(u=>u.name.toLowerCase().includes(q)||u.handle.toLowerCase().includes(q));
  let html='';
  if(matchUsers.length)html+=`<div style="padding:10px 16px;font-size:12px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);text-transform:uppercase;letter-spacing:.04em">People</div>`+matchUsers.map(u=>`<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer" onclick="showPage('profile','${u.id}')"><div class="av av-md" style="background:${hue(u.name)}">${initials(u.name)}</div><div><div style="font-size:14px;font-weight:500">${esc(u.name)}</div><div style="font-size:12px;color:var(--color-text-secondary)">@${u.handle}</div></div></div>`).join('');
  if(matchPosts.length)html+=`<div style="padding:10px 16px;font-size:12px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);text-transform:uppercase;letter-spacing:.04em">Posts</div>`+matchPosts.map(p=>postCardHTML(p)).join('');
  if(!matchPosts.length&&!matchUsers.length)html=`<div class="empty-state"><i class="ti ti-search-off" aria-hidden="true"></i><p>Nothing matched "${esc(val)}"</p></div>`;
  res.innerHTML=html;
}

function filterExplore(tag){
  document.getElementById('exploreSearch').value=tag;
  handleExploreSearch(tag);
}

function renderNotifs(el){
  const myNotifs=Object.values(db.notifs).filter(n=>n.to===me).sort((a,b)=>b.ts-a.ts);
  el.innerHTML=`<div style="background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px;font-size:16px;font-weight:500">Alerts</div>`+
  (myNotifs.length===0?`<div class="empty-state"><i class="ti ti-bell-off" aria-hidden="true"></i><p>Nothing here yet. When people interact with your posts, you'll see it here.</p></div>`
  :myNotifs.map(n=>{
    const from=db.users[n.from];if(!from)return'';
    const icons={like:'<i class="ti ti-heart" aria-hidden="true" style="color:#e2394a;font-size:17px"></i>',reply:'<i class="ti ti-message-circle" aria-hidden="true" style="color:#6366f1;font-size:17px"></i>',follow:'<i class="ti ti-user-plus" aria-hidden="true" style="color:#059669;font-size:17px"></i>'};
    const msgs={like:`<strong>${esc(from.name)}</strong> liked your post`,reply:`<strong>${esc(from.name)}</strong> replied to your post`,follow:`<strong>${esc(from.name)}</strong> started following you`};
    db.notifs[n.id].read=true;
    return `<div class="notif${n.read?'':' unread'}" onclick="${n.pid?`showPage('post','${n.pid}')`:`showPage('profile','${n.from}')`}">
      <div class="notif-icon">${icons[n.type]||''}</div>
      <div class="notif-text">${msgs[n.type]||''}</div>
      <div class="notif-time">${ago(n.ts)}</div>
    </div>`;
  }).join(''));
  save();updateNotifDot();
}

function updateNotifDot(){
  const unread=Object.values(db.notifs).filter(n=>n.to===me&&!n.read).length;
  const dot=document.getElementById('notifDot');
  if(dot)dot.style.display=unread>0?'block':'none';
}

function renderRightSide(){
  const trends=[{tag:'#webdev',count:89},{tag:'#photography',count:142},{tag:'#writing',count:203},{tag:'#design',count:67},{tag:'#film',count:44}];
  document.getElementById('trendingList').innerHTML=trends.map(t=>`<div class="trending-item" onclick="showPage('explore');setTimeout(()=>{document.getElementById('exploreSearch').value='${t.tag}';handleExploreSearch('${t.tag}')},50)"><div class="t-tag">${t.tag}</div><div class="t-count">${t.count} posts</div></div>`).join('');

  const others=Object.values(db.users).filter(u=>u.id!==me&&!(db.users[me].following||[]).includes(u.id)).slice(0,3);
  document.getElementById('whoToFollow').innerHTML=others.map(u=>`<div class="wf-item">
    <div class="av av-sm" style="background:${hue(u.name)}">${initials(u.name)}</div>
    <div style="min-width:0;flex:1">
      <div class="wf-name" onclick="showPage('profile','${u.id}')">${esc(u.name)}</div>
      <div class="wf-handle">@${u.handle}</div>
    </div>
    <button class="wf-follow" id="wff-${u.id}" onclick="quickFollow('${u.id}')">Follow</button>
  </div>`).join('');
}

function quickFollow(uid){
  const them=db.users[uid];const me_u=db.users[me];if(!them||!me_u)return;
  const key=me+'_'+uid;
  db.follows[key]=true;
  if(!me_u.following.includes(uid))me_u.following.push(uid);
  if(!them.followers.includes(me))them.followers.push(me);
  const nid='n'+uid();
  db.notifs[nid]={id:nid,to:uid,from:me,type:'follow',ts:Date.now(),read:false};
  save();updateNotifDot();
  const btn=document.getElementById('wff-'+uid);
  if(btn){btn.textContent='Following';btn.classList.add('on');btn.disabled=true}
  toast('Following @'+them.handle,'ok');
}

let toastTimer;
function toast(msg,type){
  const z=document.getElementById('toastZone');
  const tm=document.getElementById('toastMsg');
  z.style.display='block';
  tm.innerHTML=`<i class="ti ${type==='ok'?'ti-check':'ti-x'}" style="font-size:14px;color:${type==='ok'?'#059669':'#e2394a'}" aria-hidden="true"></i><span style="color:var(--color-text-primary)">${msg}</span>`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{z.style.display='none'},2800);
}

boot();
</script>
